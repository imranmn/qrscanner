<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengimbas Kod QR (Bootstrap 5)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <style>
        /* Sedikit CSS tambahan untuk memastikan kontena kamera tidak melebihi skrin */
        body {
            background-color: #f8f9fa; /* Warna latar belakang kelabu lembut Bootstrap */
        }
        #reader {
            width: 100%;
            border: none !important; /* Membuang border lalai library untuk nampak lebih kemas */
        }
        /* Mengemaskan butang lalai yang dijana oleh library html5-qrcode */
        #reader button {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        #reader button:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100 py-4">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Pengimbas QR Web</h2>
                            <p class="text-muted">Halakan kamera pada kod QR untuk mengimbas</p>
                        </div>
                        
                        <div id="reader" class="overflow-hidden rounded-3 mb-4"></div>
                        
                        <div id="result" class="alert alert-success text-center" style="display: none;" role="alert">
                            <h5 class="alert-heading fw-bold"><i class="bi bi-check-circle-fill"></i> Hasil Imbasan:</h5>
                            <hr>
                            <span id="qr-text" class="fs-5 text-break"></span>
                        </div>

                    </div>
                </div>
                
                <div class="text-center mt-3 text-muted small">
                    Dikuasakan oleh HTML5 & Bootstrap 5
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script>
        function onScanSuccess(decodedText, decodedResult) {
            const resultDiv = document.getElementById('result');
            const qrTextSpan = document.getElementById('qr-text');
            
            // Paparkan kotak hasil Bootstrap (tukar display block)
            resultDiv.style.display = 'block';
            
            // Periksa jika teks yang diimbas adalah pautan (URL) yang sah
            if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
                qrTextSpan.innerHTML = `<a href="${decodedText}" class="alert-link" target="_blank">${decodedText}</a>`;
            } else {
                qrTextSpan.innerText = decodedText;
            }
        }

        function onScanFailure(error) {
            // Biarkan kosong untuk mengelakkan spam di ruangan console
        }

        // Tetapan pengimbas
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, 
                // Menggunakan saiz relatif supaya sesuai dengan skrin telefon yang kecil
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 // Mengekalkan nisbah paparan kotak
            },
            false
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
